spring:
  datasource:
    url: jdbc:mysql://${busi.outer-ip}:3316/doc_auth_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&maxAllowedPacket=10485760
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接最大存活时间(毫秒)，设置为比MySQL wait_timeout少30秒，默认25分钟
      max-lifetime: 1800000
      # 连接超时时间(毫秒)
      connection-timeout: 30000
      # 空闲连接最大存活时间(毫秒)
      idle-timeout: 600000
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接池大小
      maximum-pool-size: 20
      # 连接测试查询
      connection-test-query: SELECT 1
      # 泄漏检测阈值(毫秒)，0表示禁用
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      port: 6479
      database: 0
      password: ${REDIS_PASSWORD:sean1234}
      host: ${REDIS_HOST:117.72.183.119}

server:
  port: 8081

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

busi:
  outer-ip: 117.72.183.119
