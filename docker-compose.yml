services:
  # --- 1. Spring Boot 应用 ---
  wps-app:
    image: ghcr.io/seanpoke/wps-password-backend:master
    container_name: wps_app_container
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      mysql8:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - MYSQL_HOST=mysql8
      - MYSQL_PORT=3306
      - MYSQL_USER=testuser
      - MYSQL_PASSWORD=test123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=sean1234
      - TZ=Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - wps_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 2. MySQL 数据库 ---
  mysql8:
    image: mysql:8.0
    container_name: mysql8_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: doc_auth_system
      MYSQL_USER: testuser
      MYSQL_PASSWORD: test123456
      TZ: Asia/Shanghai
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3316:3306"
    volumes:
      - mysql8_data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - wps_network
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 3. Redis 缓存 ---
  redis:
    image: redis:7.2-alpine
    container_name: redis_container
    restart: always
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6479:6379"
    volumes:
      - redis_data:/data
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - wps_network
    command: >
      redis-server /etc/redis/redis.conf
      --requirepass sean1234
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sean1234", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mysql8_data:
  redis_data:

networks:
  wps_network:
    driver: bridge