name: 自动清理 Actions 记录
on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间 9:00
  workflow_dispatch:     # 手动触发

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 差异化清理：当前清理脚本保留2条，业务脚本保留5条
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_FILE: "auto-clean.yml"
        run: |
          set -e

          echo "===== 开始按规则清理工作流记录 ====="
          
          # 获取所有工作流的 id, name 和 path，用 tab 分隔
          gh api "/repos/$REPO/actions/workflows" | jq -r '.workflows[] | "\(.id)\t\(.name)\t\(.path)"' | \
            while IFS=$'\t' read -r WF_ID WF_NAME WF_PATH; do
              
              # 提取路径中的文件名 (例如从 .github/workflows/docker-publish.yml 提取出 docker-publish.yml)
              WF_FILE=$(basename "$WF_PATH")

              # 根据文件名动态决定保留多少条总记录
              if [ "$WF_FILE" = "$CURRENT_FILE" ]; then
                KEEP_NUM=2
                echo -e "\n🧹 发现清理脚本自身 [$WF_NAME] ($WF_FILE), 将保留最新 $KEEP_NUM 条历史记录"
              else
                KEEP_NUM=5
                echo -e "\n📦 发现业务脚本 [$WF_NAME] ($WF_FILE), 将保留最新 $KEEP_NUM 条历史记录"
              fi

              # 安全清理：获取该工作流所有已完成(completed)的记录，按时间从新到旧排序，切片丢弃最新的 KEEP_NUM 条，其余全部删除
              gh api "/repos/$REPO/actions/workflows/$WF_ID/runs?status=completed&per_page=100" | \
                jq -r --argjson keep "$KEEP_NUM" '.workflow_runs | sort_by(.created_at) | reverse | .[$keep:] | .[].id' | \
                xargs -I{} sh -c 'echo "🗑️ 删除旧记录: {}" && gh api -X DELETE "/repos/$REPO/actions/runs/{}"'
                
            done

          echo -e "\n✅ 全部清理完成！"
