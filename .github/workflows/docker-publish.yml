name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ] # 监听 main 分支，也可以改为 master
    tags: [ 'v*' ]       # 监听 v 开头的标签

env:
  # GitHub Container Registry
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Docker Hub
  REGISTRY_DOCKERHUB: docker.io
  DOCKERHUB_IMAGE_NAME: seanpoke/wps-password-backend

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须有写入 packages 的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. 先构建 Spring Boot 的 Jar 包
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 登录到 GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 登录到 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 提取元数据（tags, labels）用于 GHCR
      - name: Extract metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}

      # 提取元数据（tags, labels）用于 Docker Hub
      - name: Extract metadata for Docker Hub
        id: meta-dockerhub
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY_DOCKERHUB }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short

      # 构建并推送到两个仓库
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
          labels: |
            ${{ steps.meta-ghcr.outputs.labels }}
            ${{ steps.meta-dockerhub.outputs.labels }}